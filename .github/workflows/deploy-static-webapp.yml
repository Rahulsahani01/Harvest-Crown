name: Deploy static web app

# Triggered manually from the GitHub Actions UI
on:
  workflow_dispatch:

jobs:
  # ─── Job 1: Authorization Gate ────────────────────────────────────────────
  # Blocks the pipeline if the triggering user is not in the allowlist
  approval-gate:
    name: Approval
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verifying Github User
        run: |
          AUTHORIZED_USERS=("045ayush")
          if [[ ! " ${AUTHORIZED_USERS[*]} " =~ " ${{ github.actor }} " ]]; then
            echo "Unauthorized user: ${{ github.actor }}"
            exit 1
          fi
        if: (github.event_name == 'workflow_dispatch')

  # ─── Job 2: Build & Deploy ────────────────────────────────────────────────
  # Runs only after the approval gate passes
  build-and-deploy:
    needs: [approval-gate]
    name: Build and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: (github.event_name == 'workflow_dispatch')
    steps:
      # Checkout the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Node.js 20 with npm dependency caching
      # cache-dependency-path points to the lock file at the repo root
      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      # Install exact dependency versions from package-lock.json
      - name: Install dependencies
        run: npm ci

      # Inject Azure Communication Services secrets for the serverless API
      - name: Create API environment file
        run: |
          mkdir -p api
          {
            echo "ACS_CONNECTION_STRING=${{ secrets.ACS_CONNECTION_STRING }}"
            echo "ACS_EMAIL_SENDER=${{ secrets.ACS_EMAIL_SENDER }}"
            echo "ACS_EMAIL_RECIPIENT=${{ secrets.ACS_EMAIL_RECIPIENT }}"
            echo "VITE_WHATSAPP_NUMBER=${{ secrets.VITE_WHATSAPP_NUMBER }}"
          } > api/.env

      # Compile TypeScript and bundle assets via Vite
      # Output goes to /dist (Vite default — no custom outDir set in vite.config.ts)
      - name: Build React application
        run: npm run build

      # Deploy to Azure Static Web Apps
      # app_location: ""  → project root (where package.json lives)
      # output_location: "dist" → Vite's default build output directory
      - name: Deploy to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          app_location: ""
          api_location: "api"
          output_location: "dist"
          action: "upload"
